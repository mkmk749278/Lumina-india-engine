name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
      - "feat/**"
      - "fix/**"
      - "docs/**"
      - "chore/**"
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save Actions minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-and-hygiene:
    name: Docs & secret hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required operating docs present
        run: |
          missing=0
          for f in CLAUDE.md OWNER_BRIEF.md ACTIVE_CONTEXT.md; do
            if [ ! -f "$f" ]; then echo "::error::missing required doc $f"; missing=1; fi
          done
          exit $missing

      - name: No committed private keys or cloud credentials
        run: |
          # Match real credential MATERIAL, never env-var names (docs reference
          # FYERS_SECRET_KEY / RAZORPAY_KEY_SECRET as names — those must not trip this).
          pattern='-----BEGIN [A-Z ]*PRIVATE KEY-----|AKIA[0-9A-Z]{16}|"private_key"[[:space:]]*:[[:space:]]*"-----BEGIN'
          if grep -rInE "$pattern" --exclude-dir='.git' --exclude-dir='.github' . ; then
            echo "::error::possible committed secret material — see matches above"
            exit 1
          fi
          echo "clean: no private-key or cloud-credential material found"

  python:
    name: Python lint / type / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect Python sources
        id: detect
        run: |
          if find . -name '*.py' -not -path './.git/*' | grep -q .; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
          fi
          echo "has_src=$([ -d src ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_tests=$([ -d tests ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.4.9 mypy==1.10.0
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ruff lint
        if: steps.detect.outputs.has_py == 'true'
        run: ruff check .

      - name: Syntax check (ast.parse) every Python file
        if: steps.detect.outputs.has_py == 'true'
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            python -c "import ast,sys; ast.parse(open(sys.argv[1]).read())" "$f" \
              || { echo "::error file=$f::syntax error"; fail=1; }
          done < <(find . -name '*.py' -not -path './.git/*' -print0)
          exit $fail

      - name: Mypy
        if: steps.detect.outputs.has_src == 'true'
        run: mypy src config

      - name: Pytest
        if: steps.detect.outputs.has_tests == 'true'
        run: |
          pip install pytest==8.2.2 pytest-asyncio==0.23.7
          python -m pytest tests/ -x -q

      - name: Nothing to build yet
        if: steps.detect.outputs.has_py == 'false'
        run: echo "Docs-only repo so far — Python gates activate automatically once src/ and tests/ land."
