name: Deploy to VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - "OWNER_BRIEF.md"
      - "ACTIVE_CONTEXT.md"
      - "CLAUDE.md"
      - "*.md"
      - "!deploy.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy India engine
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          request_pty: true
          command_timeout: 12m
          script: |
            set -euo pipefail

            echo "::add-mask::${{ secrets.GH_PAT }}"

            ENGINE_DIR="/opt/lumin-india"

            # ── Bootstrap: deploy key (survives OS reinstall) ────────
            DEPLOY_PUBKEY="${{ secrets.VPS_DEPLOY_PUBKEY }}"
            if [ -n "$DEPLOY_PUBKEY" ]; then
              mkdir -p ~/.ssh && chmod 700 ~/.ssh
              touch ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys
              grep -qF "$DEPLOY_PUBKEY" ~/.ssh/authorized_keys 2>/dev/null \
                || echo "$DEPLOY_PUBKEY" >> ~/.ssh/authorized_keys
            fi

            # ── Bootstrap: Docker (if missing on fresh VPS) ──────────
            if ! command -v docker &>/dev/null; then
              echo "Installing Docker..."
              apt-get update -qq
              apt-get install -y -qq ca-certificates curl gnupg >/dev/null
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker && systemctl start docker
            fi
            systemctl is-active --quiet docker || systemctl start docker

            # ── Bootstrap: nginx (if missing) ────────────────────────
            if ! command -v nginx &>/dev/null; then
              echo "Installing nginx..."
              apt-get update -qq
              apt-get install -y -qq nginx >/dev/null
              systemctl enable nginx && systemctl start nginx
            fi

            # ── Clone / pull repo ────────────────────────────────────
            if [ ! -d "$ENGINE_DIR/.git" ]; then
              echo "Fresh VPS — cloning repository..."
              git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/mkmk749278/Lumina-india-engine.git "$ENGINE_DIR"
            fi

            cd "$ENGINE_DIR"
            git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/mkmk749278/Lumina-india-engine.git
            git fetch origin main
            git reset --hard origin/main

            # ── .env from template ───────────────────────────────────
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "Created .env from template"
            fi

            # ── Inject secrets ───────────────────────────────────────
            # Empty secrets are skipped so a deploy never wipes a value
            # set directly on the VPS (e.g. the daily Fyers token from
            # scripts/fyers_token.py).
            _inject() {
              local key="$1" val="$2"
              if [ -z "$val" ]; then
                echo "skip ${key} (secret not set)"
                return 0
              fi
              if grep -q "^${key}=" .env 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }

            _inject FYERS_CLIENT_ID "${{ secrets.FYERS_CLIENT_ID }}"
            _inject FYERS_ACCESS_TOKEN "${{ secrets.FYERS_ACCESS_TOKEN }}"
            _inject FYERS_SECRET_KEY "${{ secrets.FYERS_SECRET_KEY }}"
            _inject FYERS_PIN "${{ secrets.FYERS_PIN }}"
            _inject API_STATIC_TOKEN "${{ secrets.API_STATIC_TOKEN }}"
            _inject DATA_FEED "${{ secrets.DATA_FEED }}"
            _inject ANGEL_API_KEY "${{ secrets.ANGEL_API_KEY }}"
            _inject ANGEL_CLIENT_CODE "${{ secrets.ANGEL_CLIENT_CODE }}"
            _inject ANGEL_PIN "${{ secrets.ANGEL_PIN }}"
            _inject ANGEL_TOTP_SECRET "${{ secrets.ANGEL_TOTP_SECRET }}"

            # Firebase service account JSON (multi-line value).
            # Write it verbatim — the engine parses JSON from the env var.
            FIREBASE_SA='${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}'
            if [ -n "$FIREBASE_SA" ]; then
              # Remove any existing entry then append as a single line.
              sed -i '/^FIREBASE_SERVICE_ACCOUNT_JSON=/d' .env
              printf 'FIREBASE_SERVICE_ACCOUNT_JSON=%s\n' "$FIREBASE_SA" >> .env
            fi

            chmod 600 .env

            # Refresh-token cron removed: Fyers disabled the refresh API
            # citing SEBI regulations (verified 2026-07-03). Daily token
            # entry is now the /fyers/callback one-tap flow instead.
            rm -f /etc/cron.d/lumin-india-fyers-refresh

            # ── Nginx reverse proxy (idempotent regenerate + reload) ─
            bash tools/setup-nginx.sh

            # ── Deploy containers ────────────────────────────────────
            bash deploy.sh

            echo "India engine deploy complete"
