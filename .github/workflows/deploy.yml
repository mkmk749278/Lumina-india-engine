name: Deploy to VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - "OWNER_BRIEF.md"
      - "ACTIVE_CONTEXT.md"
      - "CLAUDE.md"
      - "*.md"
      - "!deploy.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy India engine
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          request_pty: true
          command_timeout: 12m
          script: |
            set -euo pipefail

            echo "::add-mask::${{ secrets.GH_PAT }}"

            ENGINE_DIR="/opt/lumin-india"
            CERT_DIR="/etc/ssl/cloudflare"
            DOMAIN="lumintrade.app"

            # ── Bootstrap: deploy key (survives OS reinstall) ────────
            DEPLOY_PUBKEY="${{ secrets.VPS_DEPLOY_PUBKEY }}"
            if [ -n "$DEPLOY_PUBKEY" ]; then
              mkdir -p ~/.ssh && chmod 700 ~/.ssh
              touch ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys
              grep -qF "$DEPLOY_PUBKEY" ~/.ssh/authorized_keys 2>/dev/null \
                || echo "$DEPLOY_PUBKEY" >> ~/.ssh/authorized_keys
            fi

            # ── Bootstrap: Docker ────────────────────────────────────
            if ! command -v docker &>/dev/null; then
              echo "Installing Docker..."
              apt-get update -qq
              apt-get install -y -qq ca-certificates curl gnupg >/dev/null
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker && systemctl start docker
            fi
            systemctl is-active --quiet docker || systemctl start docker

            # ── Cloudflare Origin CA cert from secrets ───────────────
            mkdir -p "$CERT_DIR" && chmod 700 "$CERT_DIR"

            cat > "$CERT_DIR/$DOMAIN.pem" <<'CERTEOF'
            ${{ secrets.CLOUDFLARE_ORIGIN_CERT }}
            CERTEOF
            cat > "$CERT_DIR/$DOMAIN.key" <<'KEYEOF'
            ${{ secrets.CLOUDFLARE_ORIGIN_KEY }}
            KEYEOF
            chmod 600 "$CERT_DIR"/*.pem "$CERT_DIR"/*.key 2>/dev/null || true

            # ── Bootstrap: nginx (first deploy only) ─────────────────
            if ! command -v nginx &>/dev/null; then
              apt-get update -qq && apt-get install -y -qq nginx >/dev/null
            fi

            if [ ! -f /etc/nginx/sites-available/lumin-india ]; then
              cat > /etc/nginx/conf.d/lumin-india-ratelimit.conf <<'RL_EOF'
            limit_req_zone $binary_remote_addr zone=lumin_india:10m rate=60r/m;
            RL_EOF

              cat > /etc/nginx/sites-available/lumin-india <<'NGINX_EOF'
            upstream india_api {
                server 127.0.0.1:8000;
                keepalive 16;
            }

            server {
                listen 443 ssl http2;
                listen [::]:443 ssl http2;
                server_name lumintrade.app;

                ssl_certificate     /etc/ssl/cloudflare/lumintrade.app.pem;
                ssl_certificate_key /etc/ssl/cloudflare/lumintrade.app.key;
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_ciphers HIGH:!aNULL:!MD5;
                ssl_prefer_server_ciphers on;

                location / {
                    limit_req zone=lumin_india burst=30 nodelay;
                    proxy_pass http://india_api;
                    proxy_http_version 1.1;
                    proxy_set_header Connection "";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_read_timeout 30s;
                    proxy_connect_timeout 5s;

                    if ($request_method = 'OPTIONS') {
                        add_header 'Access-Control-Allow-Origin' '*' always;
                        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                        add_header 'Access-Control-Max-Age' 86400;
                        add_header 'Content-Length' 0;
                        return 204;
                    }
                }

                location ~* \.(php|asp|aspx|jsp)$ { return 444; }
                location ~ /\.(git|env|svn|htaccess) { return 444; }

                access_log /var/log/nginx/lumin-india.access.log;
                error_log  /var/log/nginx/lumin-india.error.log warn;
            }

            server {
                listen 80;
                listen [::]:80;
                server_name lumintrade.app;
                return 301 https://$host$request_uri;
            }
            NGINX_EOF

              ln -sf /etc/nginx/sites-available/lumin-india /etc/nginx/sites-enabled/lumin-india
              rm -f /etc/nginx/sites-enabled/default
            fi

            nginx -t 2>/dev/null && systemctl enable nginx --quiet && systemctl reload nginx

            # ── Clone / pull repo ────────────────────────────────────
            if [ ! -d "$ENGINE_DIR/.git" ]; then
              echo "Fresh VPS — cloning repository..."
              git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/mkmk749278/Lumina-india-engine.git "$ENGINE_DIR"
            fi

            cd "$ENGINE_DIR"
            git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/mkmk749278/Lumina-india-engine.git
            git fetch origin main
            git reset --hard origin/main

            # ── .env from template ───────────────────────────────────
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "Created .env from template"
            fi

            # ── Inject secrets ───────────────────────────────────────
            _inject() {
              local key="$1" val="$2"
              if grep -q "^${key}=" .env 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }

            _inject FYERS_CLIENT_ID "${{ secrets.FYERS_CLIENT_ID }}"
            _inject FYERS_ACCESS_TOKEN "${{ secrets.FYERS_ACCESS_TOKEN }}"

            # ── Deploy containers ────────────────────────────────────
            bash deploy.sh

            echo "India engine deploy complete"
